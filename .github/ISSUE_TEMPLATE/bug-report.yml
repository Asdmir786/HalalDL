name: Bug report
description: Report a reproducible problem in HalalDL
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        Please do not post secrets, private URLs, or cookies here. Use GitHub private vulnerability reporting for security issues.
  - type: input
    id: version
    attributes:
      label: HalalDL version
      placeholder: v0.3.7
    validations:
      required: true
  - type: dropdown
    id: build
    attributes:
      label: Build
      options:
        - Full
        - Lite
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Tell us what should have happened.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened instead?
      placeholder: Tell us what actually happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Paste...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove private information before posting.
      render: shell

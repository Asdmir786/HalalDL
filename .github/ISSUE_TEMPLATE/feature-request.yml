name: Feature request
description: Suggest a user-facing improvement for HalalDL
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature ideas are welcome. Please keep the request focused on the user problem first.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: Describe the pain point or workflow gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      placeholder: Describe the ideal behavior or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Optional. Mention workarounds or other tools/flows you tried.
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, rough mockups, or links are helpful. Do not share sensitive/private data.

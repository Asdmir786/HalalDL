name: release

on:
  workflow_dispatch:
    inputs:
      draft:
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Show tool versions
        shell: pwsh
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install pnpm dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Windows bundler dependencies
        shell: pwsh
        run: choco install -y wixtoolset nsis

      - name: Build All
        shell: pwsh
        run: pnpm build:all

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $hashLines = Get-ChildItem -Path out -File | ForEach-Object {
            $hash = Get-FileHash -Path $_.FullName -Algorithm SHA256
            "{0} *{1}" -f $hash.Hash.ToLowerInvariant(), $_.Name
          }
          $hashLines | Set-Content -Path out/SHA256SUMS.txt -Encoding ascii

      - name: Upload release assets
        uses: ncipollo/release-action@v1
        with:
          artifacts: "out/*"
          allowUpdates: true
          replacesArtifacts: true
          draft: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
          prerelease: false

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: HalalDL-release-logs-${{ github.run_id }}
          path: |
            out/*
            src-tauri/target/release/bundle/**
            src-tauri/target/release/build/**
          if-no-files-found: ignore

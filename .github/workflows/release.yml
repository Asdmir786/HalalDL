name: release

on:
  workflow_dispatch:
    inputs:
      draft:
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Show tool versions
        shell: pwsh
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Get pnpm store path
        id: pnpm-store
        shell: pwsh
        run: |
          $storePath = pnpm store path
          "store_path=$storePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install pnpm dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: sccache stats (pre)
        shell: pwsh
        run: |
          if ($env:SCCACHE_PATH) { & $env:SCCACHE_PATH --show-stats } else { sccache --show-stats }

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Windows bundler dependencies
        shell: pwsh
        run: choco install -y wixtoolset nsis

      - name: Build All
        shell: pwsh
        run: pnpm build:all

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $hashLines = Get-ChildItem -Path out -File | ForEach-Object {
            $hash = Get-FileHash -Path $_.FullName -Algorithm SHA256
            "{0} *{1}" -f $hash.Hash.ToLowerInvariant(), $_.Name
          }
          $hashLines | Set-Content -Path out/SHA256SUMS.txt -Encoding ascii

      - name: sccache stats (post)
        if: always()
        shell: pwsh
        run: |
          if ($env:SCCACHE_PATH) { & $env:SCCACHE_PATH --show-stats } else { sccache --show-stats }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          draft: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
          prerelease: false

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HalalDL-release-logs-${{ github.run_id }}
          path: |
            out/*
            src-tauri/target/release/bundle/**
            src-tauri/target/release/build/**
          if-no-files-found: ignore

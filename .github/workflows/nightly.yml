name: nightly

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack install

      - name: Show tool versions
        shell: pwsh
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install pnpm dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache

      - name: Add cargo bin to PATH
        shell: pwsh
        run: |
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "$cargoBin;$env:PATH"
          Get-Command sccache -ErrorAction Stop | Out-Host

      - name: Expose GitHub runtime for sccache
        uses: crazy-max/ghaction-github-runtime@v3

      - name: sccache stats (pre)
        shell: pwsh
        run: sccache --show-stats

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Windows bundler dependencies
        shell: pwsh
        run: choco install -y wixtoolset nsis

      - name: Build All
        shell: pwsh
        run: pnpm build:all

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $hashLines = Get-ChildItem -Path out -File | ForEach-Object {
            $hash = Get-FileHash -Path $_.FullName -Algorithm SHA256
            "{0} *{1}" -f $hash.Hash.ToLowerInvariant(), $_.Name
          }
          $hashLines | Set-Content -Path out/SHA256SUMS.txt -Encoding ascii

      - name: sccache stats (post)
        if: always()
        shell: pwsh
        run: sccache --show-stats

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: HalalDL-nightly-${{ github.sha }}
          path: out/*
          if-no-files-found: error

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: HalalDL-nightly-logs-${{ github.run_id }}
          path: |
            out/*
            src-tauri/target/release/bundle/**
            src-tauri/target/release/build/**
          if-no-files-found: ignore
